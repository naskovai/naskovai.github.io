<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  function getTheme() {
    return document.body.classList.contains('dark') ? 'dark' : 'neutral';
  }

  function renderAll() {
    mermaid.initialize({ startOnLoad: false, theme: getTheme() });
    document.querySelectorAll('.mermaid[data-source]').forEach(function (div) {
      div.removeAttribute('data-processed');
      div.innerHTML = div.getAttribute('data-source');
    });
    mermaid.run({ querySelector: '.mermaid' });
  }

  document.addEventListener('DOMContentLoaded', function () {
    const blocks = document.querySelectorAll('code.language-mermaid');
    if (!blocks.length) return;

    blocks.forEach(function (el) {
      const source = el.textContent;
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.setAttribute('data-source', source);
      div.textContent = source;
      // Walk up to the .highlight wrapper (Hugo wraps code in table when lineNos=true)
      const wrapper = el.closest('.highlight') || el.parentElement;
      wrapper.parentElement.replaceChild(div, wrapper);
    });

    renderAll();

    new MutationObserver(renderAll)
      .observe(document.body, { attributes: true, attributeFilter: ['class'] });
  });
</script>
