{{ if findRE "```mermaid" .RawContent }}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  function getTheme() {
    return document.body.classList.contains('dark') ? 'dark' : 'neutral';
  }

  function renderAll() {
    mermaid.initialize({ startOnLoad: false, theme: getTheme() });
    document.querySelectorAll('.mermaid[data-source]').forEach(function (div) {
      div.removeAttribute('data-processed');
      div.innerHTML = div.getAttribute('data-source');
    });
    mermaid.run({ querySelector: '.mermaid' });
  }

  document.addEventListener('DOMContentLoaded', function () {
    // Convert code blocks to mermaid divs, storing source for re-renders
    document.querySelectorAll('code.language-mermaid').forEach(function (el) {
      const pre = el.parentElement;
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.setAttribute('data-source', el.textContent);
      div.textContent = el.textContent;
      pre.parentElement.replaceChild(div, pre);
    });
    renderAll();

    // Re-render when theme toggles (PaperModX toggles .dark on body)
    new MutationObserver(renderAll)
      .observe(document.body, { attributes: true, attributeFilter: ['class'] });
  });
</script>
{{ end }}
